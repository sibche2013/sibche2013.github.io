<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amin Arjmand - Demo</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Tahoma,sans-serif;
        }

        body{
            background:#0f172a;
            color:#fff;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:900px;
            max-width:90%;
            text-align:center;
        }

        h1{
            font-size:48px;
            margin-bottom:10px;
        }

        p{
            color:#94a3b8;
            margin-bottom:40px;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
        }

        .card{
            background:#1e293b;
            padding:25px;
            border-radius:15px;
            transition:.3s;
            text-decoration:none;
            color:#fff;
        }

        .card:hover{
            transform:translateY(-5px);
            background:#2563eb;
        }

        h3{
            margin-bottom:10px;
        }
    </style>

</head>
<body>

<div class="container">

    <h1>🚀 Demo Projects</h1>

    <p>نمونه پروژه‌های Amin Arjmand</p>

    <div class="grid">

        <a class="card" href="/AdminLTE-RTL/">
            <h3>AdminLTE RTL</h3>
            <span>مشاهده پروژه</span>
        </a>

        <a class="card" href="/Project2/">
            <h3>Project 2</h3>
            <span>مشاهده پروژه</span>
        </a>

        <a class="card" href="/Project3/">

            <span>مشاهده پروژه</span>
        </a>

    </div>

</div>

</body>
</html>
