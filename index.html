<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>امین ارجمند | داشبورد پروژه‌ها</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <div class="bg-glow"></div>

    <header class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <div class="avatar">A</div>
                <span class="logo-text">aminarjmand<span class="slash">/</span>projects</span>
            </div>
            <div class="nav-right">
                <button id="lang-toggle" class="btn-nav">EN</button>
            </div>
        </div>
    </header>

    <main class="dashboard-container">
        <section class="stats-grid" id="stats-container">
            <div class="stat-card glass">
                <span class="stat-title" data-en="Total Repos" data-fa="کل مخازن">کل مخازن</span>
                <span class="stat-value" id="repo-count">0</span>
            </div>
            <div class="stat-card glass">
                <span class="stat-title" data-en="Total Stars" data-fa="مجموع ستارگان">مجموع ستارگان</span>
                <span class="stat-value" id="star-count">0</span>
            </div>
            <div class="stat-card glass">
                <span class="stat-title" data-en="Top Language" data-fa="زبان اصلی">زبان اصلی</span>
                <span class="stat-value" id="top-lang">-</span>
            </div>
        </section>

        <section class="controls-bar glass">
            <input type="text" id="search-input" placeholder="جستجو در پروژه‌ها..." data-en="Search projects..." data-fa="جستجو در پروژه‌ها...">
            <div class="filter-tags" id="filter-tags">
                <button class="tag active" data-lang="all" data-en="All" data-fa="همه">همه</button>
            </div>
        </section>

        <section class="projects-grid" id="projects-grid">
            <div class="loading" data-en="Loading Projects..." data-fa="در حال بارگذاری پروژه‌ها...">در حال بارگذاری پروژه‌ها...</div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
