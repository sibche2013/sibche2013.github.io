<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amin Arjmand - Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');

        :root {
            --bg: #0a0a0a;
            --card: rgba(255, 255, 255, 0.06);
            --text: #e0e0e0;
            --accent: #00d4ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Animated Background */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, rgba(0, 212, 255, 0.08) 0%, transparent 70%);
            overflow: hidden;
        }

        .background::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://source.unsplash.com/random/1920x1080/?space,nebula') no-repeat center center/cover;
            opacity: 0.15;
            animation: bgMove 120s linear infinite;
        }

        @keyframes bgMove {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 1.2rem 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(90deg, #00d4ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 2rem;
            font-weight: 500;
            transition: all 0.3s;
        }

        nav a:hover {
            color: var(--accent);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .search-box {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 0.6rem 1.2rem;
            width: 280px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }

        .search-box input {
            background: none;
            border: none;
            outline: none;
            color: white;
            width: 100%;
            font-size: 1rem;
        }

        .theme-toggle {
            background: none;
            border: none;
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
        }

        /* Hero */
        .hero {
            height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }

        .hero-content {
            max-width: 800px;
            z-index: 2;
        }

        .hero h1 {
            font-size: 4.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #ffffff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.4rem;
            opacity: 0.9;
            margin-bottom: 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1.5rem;
            margin-top: 3rem;
        }

        .stat-card {
            padding: 1.5rem;
            text-align: center;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-8px);
        }

        .stat-number {
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--accent);
        }

        /* Projects Section */
        .section {
            padding: 6rem 5%;
        }

        .section-title {
            font-size: 2.8rem;
            margin-bottom: 3rem;
            text-align: center;
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: var(--accent);
            border-radius: 2px;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 3rem;
        }

        .filter-btn {
            padding: 0.7rem 1.5rem;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn.active, .filter-btn:hover {
            background: var(--accent);
            color: black;
            border-color: var(--accent);
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 2rem;
        }

        .project-card {
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .project-card:hover {
            transform: translateY(-15px) scale(1.03);
            box-shadow: 0 30px 60px rgba(0, 212, 255, 0.2);
        }

        .project-img {
            height: 220px;
            background: #1a1a1a;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .project-img::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent, rgba(10,10,10,0.8));
        }

        .project-body {
            padding: 1.8rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .project-title {
            font-size: 1.5rem;
            margin-bottom: 0.8rem;
        }

        .project-desc {
            opacity: 0.85;
            margin-bottom: 1.5rem;
            flex: 1;
        }

        .project-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95rem;
        }

        .lang {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .lang-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 3rem;
            opacity: 0.7;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 { font-size: 3.2rem; }
            .projects-grid { grid-template-columns: 1fr; }
            header { padding: 1rem 5%; }
        }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="background"></div>

    <!-- Header -->
    <header class="glass">
        <div class="logo">amin<span style="color:#00d4ff;">.</span></div>
        <nav>
            <a href="#projects">پروژه‌ها</a>
            <a href="https://github.com/aminarjmand" target="_blank">گیت‌هاب</a>
            <a href="#">درباره من</a>
        </nav>
        <div class="header-right">
            <div class="search-box glass">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="جستجوی پروژه...">
            </div>
            <button class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </header>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-content">
            <h1>امین ارجمند</h1>
            <p>توسعه‌دهنده فول‌استک | علاقه‌مند به UI/UX مدرن و تجربه‌های دیجیتال</p>
            
            <div class="stats-grid">
                <div class="stat-card glass">
                    <div class="stat-number" id="repoCount">42</div>
                    <div>مخزن</div>
                </div>
                <div class="stat-card glass">
                    <div class="stat-number" id="starCount">1240</div>
                    <div>ستاره</div>
                </div>
                <div class="stat-card glass">
                    <div class="stat-number" id="followerCount">89</div>
                    <div>فالوور</div>
                </div>
            </div>
        </div>
    </section>

    <!-- Projects -->
    <section class="section" id="projects">
        <h2 class="section-title">پروژه‌های منتخب</h2>
        
        <div class="filters">
            <button class="filter-btn active" data-filter="all">همه</button>
            <button class="filter-btn" data-filter="javascript">JavaScript</button>
            <button class="filter-btn" data-filter="python">Python</button>
            <button class="filter-btn" data-filter="typescript">TypeScript</button>
            <button class="filter-btn" data-filter="other">سایر</button>
        </div>

        <div class="projects-grid" id="projectsGrid">
            <!-- Cards will be injected by JS -->
        </div>
    </section>

    <footer>
        <p>ساخته شده با ❤️ و JavaScript خالص • ۲۰۲۶</p>
    </footer>

    <script>
        // GitHub Username
        const USERNAME = "sibche2013"; // تغییر بده به یوزرنیم خودت

        let allRepos = [];

        // Fetch GitHub Data
        async function fetchGitHubData() {
            try {
                // Check cache
                const cached = localStorage.getItem('github_repos');
                const cacheTime = localStorage.getItem('github_cache_time');
                
                if (cached && cacheTime && (Date.now() - parseInt(cacheTime) < 3600000)) {
                    allRepos = JSON.parse(cached);
                    renderProjects(allRepos);
                    updateStats(allRepos);
                    return;
                }

                const response = await fetch(`https://api.github.com/users/${USERNAME}/repos?sort=updated&per_page=100`);
                const repos = await response.json();
                
                allRepos = repos.filter(repo => !repo.fork && repo.name !== USERNAME);
                
                // Cache
                localStorage.setItem('github_repos', JSON.stringify(allRepos));
                localStorage.setItem('github_cache_time', Date.now());
                
                renderProjects(allRepos);
                updateStats(allRepos);
            } catch (error) {
                console.error("خطا در دریافت اطلاعات:", error);
                // Fallback data
                allRepos = [
                    { name: "demo-project", description: "پروژه دمو", language: "JavaScript", stargazers_count: 45, updated_at: "2026-06-01" }
                ];
                renderProjects(allRepos);
            }
        }

        function updateStats(repos) {
            document.getElementById('repoCount').textContent = repos.length;
            const totalStars = repos.reduce((sum, r) => sum + r.stargazers_count, 0);
            document.getElementById('starCount').textContent = totalStars;
        }

        function getLanguageColor(lang) {
            const colors = {
                "JavaScript": "#f1e05a",
                "TypeScript": "#3178c6",
                "Python": "#3572A5",
                "HTML": "#e34c26",
                "CSS": "#563d7c",
                "Go": "#00ADD8"
            };
            return colors[lang] || "#888";
        }

        function renderProjects(repos) {
            const container = document.getElementById('projectsGrid');
            container.innerHTML = '';

            repos.forEach(repo => {
                const card = document.createElement('div');
                card.className = 'project-card glass';
                card.innerHTML = `
                    <div class="project-img" style="background-image: url('https://opengraph.githubassets.com/1/${USERNAME}/${repo.name}')"></div>
                    <div class="project-body">
                        <h3 class="project-title">${repo.name.replace(/-/g, ' ')}</h3>
                        <p class="project-desc">${repo.description || 'بدون توضیحات'}</p>
                        <div class="project-meta">
                            <div class="lang">
                                <span class="lang-dot" style="background-color: ${getLanguageColor(repo.language)}"></span>
                                <span>${repo.language || '—'}</span>
                            </div>
                            <div>
                                <i class="fas fa-star"></i> ${repo.stargazers_count}
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Search & Filter
        function filterProjects() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;
            
            const filtered = allRepos.filter(repo => {
                const matchesSearch = repo.name.toLowerCase().includes(searchTerm) || 
                                    (repo.description && repo.description.toLowerCase().includes(searchTerm));
                
                let matchesFilter = true;
                if (activeFilter !== 'all') {
                    matchesFilter = repo.language && repo.language.toLowerCase() === activeFilter;
                }
                return matchesSearch && matchesFilter;
            });
            
            renderProjects(filtered);
        }

        // Event Listeners
        document.addEventListener('DOMContentLoaded', () => {
            fetchGitHubData();

            // Search
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', filterProjects);

            // Filters
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    filterProjects();
                });
            });

            // Theme Toggle (Dark by default)
            document.getElementById('themeToggle').addEventListener('click', () => {
                alert('تم روشن/تیره در نسخه کامل قابل فعال‌سازی است');
            });

            // Keyboard shortcut
            document.addEventListener('keydown', e => {
                if (e.key === '/' && document.getElementById('searchInput') !== document.activeElement) {
                    e.preventDefault();
                    document.getElementById('searchInput').focus();
                }
            });
        });

        // Smooth scroll for nav
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                if (this.getAttribute('href') === '#projects') {
                    e.preventDefault();
                    document.getElementById('projects').scrollIntoView({ behavior: 'smooth' });
                }
            });
        });
    </script>
</body>
</html>
